name: Deploy Pages

on:
  push:
    branches:
      - main
    paths:
      - "blueprint/**"
      - "tex/**"
      - ".github/workflows/pages.yml"
  pull_request:
    paths:
      - "blueprint/**"
      - "tex/**"
      - ".github/workflows/pages.yml"
  workflow_run:
    # When the PDF rebuilds, re-deploy Pages so the latest PDF is picked up.
    workflows: ["Build PDF"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-blueprint:
    name: Build Blueprint
    runs-on: ubuntu-latest
    # On workflow_run, only deploy if the PDF build itself succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install graphviz dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz libgraphviz-dev

      - name: Install Lean Blueprint
        run: python3 -m pip install leanblueprint

      - name: Build Lean Blueprint site
        run: python3 -m leanblueprint.client web

      - name: Download latest PDF artifact
        if: github.event_name != 'pull_request'
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: pdf.yml
          name: jacobian-informal-proof
          branch: main
          path: tex
          if_no_artifact_found: warn

      - name: Prepare Pages site
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p _site/blueprint
          cp -R blueprint/web/. _site/blueprint/

          if [ -f tex/main.pdf ]; then
            cp tex/main.pdf _site/jacobian-informal-proof.pdf
            echo "PDF included from pdf.yml artifact"
          else
            echo "No PDF artifact available — site will deploy without PDF"
          fi

          cat > _site/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>Jacobian Challenge</title>
            </head>
            <body>
              <main>
                <h1>Jacobian Challenge</h1>
                <ul>
                  <li><a href="jacobian-informal-proof.pdf">Informal proof roadmap (PDF)</a></li>
                  <li><a href="blueprint/">Lean Blueprint dependency graph</a></li>
                </ul>
              </main>
            </body>
          </html>
          EOF

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy Pages
    if: github.event_name != 'pull_request'
    needs: build-blueprint
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
