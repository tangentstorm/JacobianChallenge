name: Build proof site

on:
  push:
    branches:
      - main
    paths:
      - "blueprint/**"
      - "tex/**"
      - ".github/workflows/tex-pdf.yml"
  pull_request:
    paths:
      - "blueprint/**"
      - "tex/**"
      - ".github/workflows/tex-pdf.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-pdf:
    name: Build PDF
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install TeX dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            graphviz \
            libgraphviz-dev \
            latexmk \
            texlive-fonts-recommended \
            texlive-latex-extra \
            texlive-latex-recommended

      - name: Install Lean Blueprint
        run: python3 -m pip install leanblueprint

      - name: Build PDF
        working-directory: tex
        run: latexmk -pdf -interaction=nonstopmode -halt-on-error main.tex

      - name: Build Lean Blueprint site
        run: python3 -m leanblueprint.client web

      - name: Prepare Pages site
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p _site/blueprint
          cp tex/main.pdf _site/jacobian-informal-proof.pdf

          cp -R blueprint/web/. _site/blueprint/

          cat > _site/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>Jacobian Challenge</title>
            </head>
            <body>
              <main>
                <h1>Jacobian Challenge</h1>
                <ul>
                  <li><a href="jacobian-informal-proof.pdf">Informal proof roadmap (PDF)</a></li>
                  <li><a href="blueprint/">Lean Blueprint dependency graph</a></li>
                </ul>
              </main>
            </body>
          </html>
          EOF

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: jacobian-informal-proof
          path: tex/main.pdf
          if-no-files-found: error

      - name: Upload LaTeX logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: latex-build-logs
          path: |
            tex/*.log
            tex/*.fls
            tex/*.fdb_latexmk
            blueprint/src/*.log
          if-no-files-found: ignore

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy Pages
    if: github.event_name != 'pull_request'
    needs: build-pdf
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
