              - generic [ref=e2242]:
                - generic [ref=e2247]:
                  - text: "Design review for an 8-node chain in the JacobianChallenge blueprint (Lean 4 + Mathlib v4.28.0, commit 8f9d9cff). The chain proves finite-dimensionality of holomorphic 1-forms on a compact Riemann surface via the analytic route (sup-norm + Montel + Riesz). I want to spawn 8 parallel cloud workers next, each filling in ONE node — but only after a 3-AI consensus (you, Grok, Claude) that the API holds together cleanly across the chain. I need: (1) Are these 8 statements internally coherent — each node consumes its predecessors' outputs without API mismatch? (2) Are the types right? (3) Are there cleaner Mathlib-native formulations I'm missing? (4) Did we hallucinate any decl name? The 8 nodes (leaf-first):"
                  - code [ref=e2249]: "lean -- 1. def:cotangent-fiber-norm noncomputable def cotangentFiberNorm (X : Type*) [TopologicalSpace X] [ChartedSpace ℂ X] [IsManifold (modelWithCornersSelf ℂ ℂ) (⊤ : WithTop ℕ∞) X] (x : X) (_v : CotangentSpace ℂ X x) : ℝ := sorry -- (uses Jacobian.HolomorphicForms.CotangentBundle, where -- CotangentSpace ℂ X x = TangentSpace 𝓘(ℂ, ℂ) x →L[ℂ] (Bundle.Trivial X ℂ) x) -- 2. def:holomorphic-sup-norm noncomputable def holomorphicSupNorm (X : Type*) [TopologicalSpace X] [CompactSpace X] [ChartedSpace ℂ X] [IsManifold (modelWithCornersSelf ℂ ℂ) (⊤ : WithTop ℕ∞) X] (_ω : HolomorphicOneForm ℂ X) : ℝ := sorry -- (HolomorphicOneForm is a project-side struct, not a Mathlib type) -- 3. lem:chart-coefficient-bound theorem chart_coefficient_bound (X : Type*) [TopologicalSpace X] [CompactSpace X] [ChartedSpace ℂ X] [IsManifold (modelWithCornersSelf ℂ ℂ) (⊤ : WithTop ℕ∞) X] (e : OpenPartialHomeomorph X ℂ) (_he : e ∈ atlas ℂ X) : ∃ C : ℝ, 0 ≤ C ∧ ∀ (ω : HolomorphicOneForm ℂ X) (x : X), x ∈ e.source → cotangentFiberNorm X x (ω.1 x) ≤ C * holomorphicSupNorm X ω := sorry -- 4. lem:montel-compactness (sequential form) theorem montel_compactness (X : Type*) [TopologicalSpace X] [CompactSpace X] [ChartedSpace ℂ X] [IsManifold (modelWithCornersSelf ℂ ℂ) (⊤ : WithTop ℕ∞) X] (ω : ℕ → HolomorphicOneForm ℂ X) (_h_bounded : ∀ n, holomorphicSupNorm X (ω n) ≤ 1) : ∃ (φ : ℕ → ℕ), StrictMono φ ∧ ∃ ωlim : HolomorphicOneForm ℂ X, holomorphicSupNorm X ωlim ≤ 1 ∧ Tendsto (fun n => holomorphicSupNorm X (ω (φ n) - ωlim)) atTop (𝓝 0) := sorry -- 5. thm:hone-unit-ball-compact (topological form, parameterised by abstract -- normed realisation H of HolomorphicOneForm — because Mathlib has no -- canonical norm on the section space) theorem hone_unit_ball_compact (X : Type*) [TopologicalSpace X] [CompactSpace X] [ChartedSpace ℂ X] [IsManifold (modelWithCornersSelf ℂ ℂ) (⊤ : WithTop ℕ∞) X] {H : Type*} [NormedAddCommGroup H] [NormedSpace ℂ H] (e : HolomorphicOneForm ℂ X ≃ₗ